<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Glow blur center -->
  <circle cx="256" cy="256" r="80" fill="#00D2F0" fill-opacity="0.07"/>

  <!-- Connection lines (subtle) -->
  <line x1="256" y1="118" x2="256" y2="216" stroke="#00D2F0" stroke-width="11" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="369" y1="174" x2="293" y2="235" stroke="#00D2F0" stroke-width="11" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="369" y1="338" x2="293" y2="277" stroke="#00D2F0" stroke-width="11" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="256" y1="394" x2="256" y2="296" stroke="#00D2F0" stroke-width="11" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="143" y1="338" x2="219" y2="277" stroke="#00D2F0" stroke-width="11" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="143" y1="174" x2="219" y2="235" stroke="#00D2F0" stroke-width="11" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- Outer nodes -->
  <circle cx="256" cy="90"  r="26" fill="#00D2F0" fill-opacity="0.9"/>
  <circle cx="392" cy="166" r="26" fill="#00D2F0" fill-opacity="0.75"/>
  <circle cx="392" cy="346" r="26" fill="#00D2F0" fill-opacity="0.75"/>
  <circle cx="256" cy="422" r="26" fill="#00D2F0" fill-opacity="0.9"/>
  <circle cx="120" cy="346" r="26" fill="#00D2F0" fill-opacity="0.75"/>
  <circle cx="120" cy="166" r="26" fill="#00D2F0" fill-opacity="0.75"/>

  <!-- Center node — brightest -->
  <circle cx="256" cy="256" r="40" fill="#00D2F0"/>
  <!-- Center inner highlight -->
  <circle cx="248" cy="248" r="14" fill="white" fill-opacity="0.25"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
  </defs>
</svg>
