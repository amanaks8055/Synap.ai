name: synap
description: "Synap - AI Tool Discovery. Maximize free tiers."
publish_to: 'none'
version: 1.1.3+8

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  url_launcher: ^6.2.1
  flutter_bloc: ^8.1.4
  flutter_svg: ^2.0.10+1
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.3.5
  shared_preferences: ^2.2.3
  google_mobile_ads: ^6.0.0
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.2.2
  supabase_flutter: ^2.3.0
  google_sign_in: ^6.2.1
  equatable: ^2.0.7
  pdf: ^3.10.8
  path_provider: ^2.1.2
  open_filex: ^4.3.4
  flutter_animate: ^4.5.0
  sensors_plus: ^6.1.1
  flutter_tts: ^4.1.1
  flutter_riverpod: ^2.5.1
  cached_network_image: ^3.4.1
  flutter_dotenv: ^5.2.1
  http: ^1.6.0
  workmanager: ^0.5.2
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#050810"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.svg
    - assets/google_logo.svg
    - assets/news_globe_logo.svg
    - assets/new logo.jpg
    - assets/image.png
    - assets/activation_character.png
    - assets/walk_frame_1.png
    - assets/walk_frame_2.png
    - assets/walk_frame_3.png
    - assets/walk_frame_4.png
